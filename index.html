<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">

    <!-- 网站图标 (Favicon) 已修复 -->

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
        }
        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #f0f0f0;
            min-height: 100vh;
            padding: 20px;
            line-height: 1.6;
        }
        .container {
            max-width: 1000px;
            margin: 30px auto;
            background: rgba(30, 30, 46, 0.85);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        .header {
            text-align: center;
            margin-bottom: 50px;
            padding-bottom: 30px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        .logo {
            width: 150px;
            height: 150px;
            margin: 0 auto 25px;
            border-radius: 50%;
            background: white;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            border: 6px solid rgba(255, 215, 0, 0.3);
            box-shadow: 0 0 30px rgba(255, 215, 0, 0.2);
        }
        .logo img {
            max-width: 80%;
            max-height: 80%;
            border-radius: 50%;
        }
        h1 {
            font-size: 3.2rem;
            margin-bottom: 10px;
            background: linear-gradient(90deg, #FFD700, #FF8C00);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .symbol {
            font-size: 1.8rem;
            color: #FFD700;
            font-weight: bold;
            letter-spacing: 2px;
            margin-bottom: 20px;
        }
        .tagline {
            font-size: 1.3rem;
            opacity: 0.85;
            max-width: 700px;
            margin: 0 auto;
        }
        .section {
            margin-bottom: 40px;
        }
        .section-title {
            font-size: 1.8rem;
            color: #4FC3F7;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid rgba(79, 195, 247, 0.3);
            display: flex;
            align-items: center;
        }
        .section-title i {
            margin-right: 12px;
        }
        .info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 25px;
            margin-top: 20px;
        }
        .info-card {
            background: rgba(40, 40, 60, 0.7);
            border-radius: 16px;
            padding: 25px;
            border-left: 5px solid #FFD700;
            transition: transform 0.3s;
        }
        .info-card:hover {
            transform: translateY(-5px);
        }
        .card-title {
            font-size: 1.1rem;
            color: #FFD700;
            margin-bottom: 12px;
            font-weight: bold;
        }
        .card-content {
            font-size: 1.2rem;
            word-break: break-all;
            font-family: 'Cier New', monospace;
  our      }
        .highlight {
            color: #4FC3F7;
            font-weight: bold;
        }
        .tax-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
        }
        .tax-card {
            background: rgba(255, 215, 0, 0.1);
            border-radius: 12px;
            padding: 20px;
            text-align: center;
        }
        .tax-rate {
            font-size: 2.5rem;
            font-weight: bold;
            color: #FFD700;
            margin-bottom: 5px;
        }
        .tax-desc {
            font-size: 0.9rem;
            opacity: 0.8;
        }
        .contract-address {
            background: rgba(0, 0, 0, 0.3);
            padding: 20px;
            border-radius: 12px;
            font-family: 'Courier New', monospace;
            word-break: break-all;
            font-size: 1.1rem;
            border: 1px solid rgba(255, 215, 0, 0.3);
            position: relative;
            margin-top: 10px;
        }
        .copy-btn {
            position: absolute;
            top: 15px;
            right: 15px;
            background: rgba(255, 215, 0, 0.2);
            color: #FFD700;
            border: 1px solid #FFD700;
            border-radius: 6px;
            padding: 8px 15px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.3s;
        }
        .copy-btn:hover {
            background: rgba(255, 215, 0, 0.3);
        }
        /* 加载动画 */
        .loader {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #0f0c29;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            transition: opacity 0.5s;
        }
        .loader.hidden {
            opacity: 0;
            pointer-events: none;
        }
        .spinner {
            width: 50px;
            height: 50px;
            border: 5px solid rgba(255, 255, 255, 0.1);
            border-top: 5px solid #FFD700;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
    <!-- 图标库 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <!-- 加载动画 -->
    <div class="loader" id="loader">
        <div class="spinner"></div>
    </div>

    <div class="container">
        <div class="header">
            <div class="logo">
                <img src="https://ivory-cautious-stoat-562.mypinata.cloud/ipfs/bafkreig7xhotcsvptfcf7ipogm6wr3u3xikmfxxakctcmw5xzzgvqu6xednm" alt="SPARK Logo">
            </div>
            <h1>星火通证</h1>
            <div class="symbol">SPARK</div>
            <p class="tagline">下一代去中心化金融生态，赋能全球用户
        </div>

        <div class="section">
            <div class="section-title"><i class="fas fa-info-circle"></i> 项目简介</div>
            <div class="info-grid">
                <div class="info-card">
                    <div class="card-title">项目名称</div>
                    <div class="card-content">星火通证 (SPARK)</div>
                </div>
                <div class="info-card">
                    <div class="card-title">网络</div>
                    <div class="card-content">以太坊 (Ethereum)</div>
                </div>
                <div class="info-card">
                    <div class="card-title">总量</div>
                    <div class="card-content">1,000,000,000 SPARK</div>
                </div>
            </div>
        </div>

        <div class="section">
            <div class="section-title"><i class="fas fa-link"></i> 合约地址</div>
            <div class="contract-address">
                0xD580C7C9Cde5ce776fEed844310330A2a40078d9
                <button class="copy-btn" id="copyContractBtn">复制</button>
            </div>
        </div>

        <div class="section">
            <div class="section-title"><i class="fas fa-percentage"></i> 税务机制</div>
            <div class="tax-grid">
                <div class="tax-card">
                    <div class="tax-rate">5%</div>
                    <div class="tax-desc">交易税（用于燃烧和生态基金）</div>
                </div>
                <div class="tax-card">
                    <div class="tax-rate">2%</div>
                    <div class="tax-desc">营销税（用于社区推广）</div>
                </div>
                <div class="tax-card">
                    <div class="tax-rate">1%</div>
                    <div class="tax-desc">持币分红（分配给长期持有者）</div>
                </div>
            </div>
        </div>

        <div class="section">
            <div class="section-title"><i class="fas fa-globe"></i> 官网链接</div>
            <div class="info-grid">
                <div class="info-card">
                    <div class="card-title">官方网站</div>
                    <div class="card-content"><a href="https://SPARKy12315000.github.io" target="_blank" class="highlight">https://SPARKy12315000.github.io</a></div>
                </div>
                <div class="info-card">
                    <div class="card-title">区块链浏览器</div>
                    <div class="card-content"><a href="https://etherscan.io/address/0xD580C7C9Cde5ce776fEed844310330A2a40078d9" target="_blank" class="highlight">Etherscan 查看合约</a></div>
                </div>
                <div class="info-card">
                    <div class="card-title">社区入口</div>
                    <div class="card-content"><a href="https://twitter.com/SPARKyToken" target="_blank" class="highlight">Twitter 社区 (模拟)</a></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 加载动画：页面加载后隐藏
        window.addEventListener('load', () => {
            const loader = document.getElementById('loader');
            setTimeout(() => {
                loader.classList.add('hidden');
            }, 1000); // 延迟1秒隐藏，增强体验
        });

        // 复制合约地址功能
        const copyBtn = document.getElementById('copyContractBtn');
        const contractAddress = '0xD580C7C9Cde5ce776fEed844310330A2a40078d9';

        copyBtn.addEventListener('click', () => {
            // 尝试使用现代剪贴板 API
            if (navigator.clipboard) {
                navigator.clipboard.writeText(contractAddress)
                    .then(() => {
                        // 复制成功反馈
                        copyBtn.textContent = '已复制!';
                        copyBtn.style.background = 'rgba(76, 175, 80, 0.2)';
                        copyBtn.style.borderColor = '#4CAF50';
                        copyBtn.style.color = '#4CAF50';
                        setTimeout(() => {
                            copyBtn.textContent = '复制';
                            copyBtn.style.background = 'rgba(255, 215, 0, 0.2)';
                            copyBtn.style.borderColor = '#FFD700';
                            copyBtn.style.color = '#FFD700';
                        }, 2000);
                    })
                    .catch(err => {
                        // 失败时降级为手动选择复制
                        fallbackCopy(contractAddress);
                    });
            } else {
                // 浏览器不支持剪贴板 API，直接降级
                fallbackCopy(contractAddress);
            }
        });

        // 降级方案：选中文本供用户手动复制
        function fallbackCopy(text) {
            const textarea = document.createElement('textarea');
            textarea.value = text;
            textarea.style.position = 'fixed'; // 避免滚动
            textarea.style.opacity = '0';
            document.body.appendChild(textarea);
            textarea.select();
            try {
                document.execCommand('copy');
                copyBtn.textContent = '已复制!';
                copyBtn.style.background = 'rgba(76, 175, 80, 0.2)';
                copyBtn.style.borderColor = '#4CAF50';
                copyBtn.style.color = '#4CAF50';
                setTimeout(() => {
                    copyBtn.textContent = '复制';
                    copyBtn.style.background = 'rgba(255, 215, 0, 0.2)';
                    copyBtn.style.borderColor = '#FFD700';
                    copyBtn.style.color = '#FFD700';
                }, 2000);
            } catch (err) {
                alert('复制失败，请手动选择地址并复制。');
            }
            document.body.removeChild(textarea);
        }
    </script>
</body>
</html>
